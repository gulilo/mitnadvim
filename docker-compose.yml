# Local PostgreSQL for Prisma shadow DB (migrate dev) and optional full local dev.
# Start: npm run db:up
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mitnadvim
      POSTGRES_PASSWORD: mitnadvim_local
      POSTGRES_DB: mitnadvim_shadow
    ports:
      # Host 5433 avoids clashing with another Postgres on 5432
      - "5433:5432"
    volumes:
      - mitnadvim_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitnadvim -d mitnadvim_shadow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mitnadvim_pgdata:
